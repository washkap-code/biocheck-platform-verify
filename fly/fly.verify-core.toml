# fly.toml app configuration file generated for biocheck-vcore on 2026-07-18T19:43:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'biocheck-vcore'
primary_region = 'lhr'

[build]
  dockerfile = '../Dockerfile.verify-core'

[env]
  APP_ENV = 'staging'
  VERIFY_CORE_FP_PRIVATE_NETWORK = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
